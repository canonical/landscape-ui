name: Release and PPA Build

# Only the publishing branches build here. main is excluded — it is no longer a
# publish target; its changeset/version bookkeeping lives in changeset-version.yml.
# Stable ships from release/*, point releases (candidate and released) from point/*.
on:
  push:
    branches: ["release/**", "point/**"]
  # Manual trigger so a branch can be (re)built after it is promoted to a clean
  # release via the RELEASED_BRANCHES variable — editing a variable
  # doesn't push a commit, so without this the branch keeps its last -rc build.
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

# Serialize builds per-branch so concurrent pushes to the same branch can't
# race each other when force-publishing to a ppa-build target.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  process-release:
    runs-on: ubuntu-latest
    # Guard against a manual workflow_dispatch on a non-publishing ref: only
    # release/* and point/* branches build, publish, and tag. (build-deb needs
    # this job, so it is skipped too when the guard fails.)
    if: startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/heads/point/')
    outputs:
      version: ${{ steps.calver.outputs.version }}
      dest_branch: ${{ steps.calver.outputs.dest_branch }}
      publish_stable: ${{ steps.calver.outputs.publish_stable }}
      should_build: ${{ steps.calver.outputs.should_build }}
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 0 }

      - uses: pnpm/action-setup@v4
        with: { version: 10 }

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Calculate Version
        id: calver
        env:
          # Optional override. Leave unset for fully automatic stable
          # promotion (the highest release/YY.MM on origin wins). Set to a
          # specific release/YY.MM to pin stable to that branch — useful for
          # demoting a bad promotion or delaying a fresh cut from going
          # stable immediately.
          STABLE_RELEASE_BRANCH: ${{ vars.STABLE_RELEASE_BRANCH }}
          # Comma/space-separated release/point branches promoted from
          # candidate (-rc) to released (clean version), e.g.
          # "release/26.10,point/26.10.1". Applies uniformly to release/* (the
          # cycle base) and point/*; unlisted branches stay -rc.
          RELEASED_BRANCHES: ${{ vars.RELEASED_BRANCHES }}
        run: |
          VERSION=$(node scripts/calculate-version.cjs)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Per-release destination: every publishing branch gets its own
          # ppa-build-* target so cycles and point releases never collide.
          #   release/26.10  -> ppa-build-26.10
          #   point/26.10.2  -> ppa-build-26.10.2   (candidate and released
          #                     share the target; the -rc suffix in the version
          #                     distinguishes them)
          case "$GITHUB_REF" in
            refs/heads/release/*)   DEST="ppa-build-${GITHUB_REF#refs/heads/release/}" ;;
            refs/heads/point/*)     DEST="ppa-build-${GITHUB_REF#refs/heads/point/}" ;;
            *)                      DEST="ppa-build-draft" ;;
          esac
          echo "dest_branch=$DEST" >> $GITHUB_OUTPUT

          # Stable promotion. By default the highest release/YY.MM branch on
          # origin is "latest stable" and gets mirrored to ppa-build-stable.
          # When STABLE_RELEASE_BRANCH is set, it bypasses auto-derivation
          # and pins stable to whatever it names.
          PUBLISH_STABLE="false"
          if [[ -n "$STABLE_RELEASE_BRANCH" ]]; then
            if [[ "$GITHUB_REF" == "refs/heads/${STABLE_RELEASE_BRANCH}" ]]; then
              PUBLISH_STABLE="true"
            fi
            echo "Stable promotion pinned via STABLE_RELEASE_BRANCH=${STABLE_RELEASE_BRANCH}"
          else
            HIGHEST_RELEASE=$(git branch -r --list 'origin/release/*' \
              | sed 's|^[ *]*origin/||' \
              | grep -E '^release/[0-9]{2}\.(04|10)$' \
              | sort -V \
              | tail -n1)
            if [[ -n "$HIGHEST_RELEASE" \
                && "$GITHUB_REF" == "refs/heads/${HIGHEST_RELEASE}" ]]; then
              PUBLISH_STABLE="true"
            fi
            echo "Auto-derived stable branch: ${HIGHEST_RELEASE:-<none>}"
          fi
          echo "publish_stable=$PUBLISH_STABLE" >> $GITHUB_OUTPUT

          # Skip the build/publish/tag entirely when this exact version was
          # already built and tagged. A push that adds only skipped commit types
          # (chore/ci/docs/test/style) leaves the counter unchanged, so the
          # version matches the last build -> its tag exists -> no-op. This also
          # keeps every v<version> tag unique.
          if git rev-parse -q --verify "refs/tags/v${VERSION}" >/dev/null; then
            echo "should_build=false" >> $GITHUB_OUTPUT
            echo "v${VERSION} is already tagged — skipping rebuild/publish."
          else
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: steps.calver.outputs.should_build == 'true'
        run: pnpm install --frozen-lockfile

      # Gated too: a no-op rebuild must not run the version bump, or it could
      # consume pending changesets / update package.json + CHANGELOG for a
      # version that is never published.
      - name: Maintain Version Packages PR
        if: steps.calver.outputs.should_build == 'true'
        id: changesets
        uses: changesets/action@v1
        with:
          version: node scripts/manual-version-update.cjs ${{ steps.calver.outputs.version }}
          commit: "chore: version bump to ${{ steps.calver.outputs.version }}"
          title: "Version Packages (${{ steps.calver.outputs.version }})"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Production Build
        if: steps.calver.outputs.should_build == 'true'
        run: pnpm run build
        env:
          VITE_APP_VERSION: ${{ steps.calver.outputs.version }}
          VITE_APP_COMMIT: ${{ github.sha }}
          VITE_API_URL: /api/v2/
          VITE_API_URL_OLD: /api/
          VITE_ROOT_PATH: /new_dashboard/

      - name: Upload dist artifact
        if: steps.calver.outputs.should_build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 5

      - name: Prepare PPA Branch
        if: steps.calver.outputs.should_build == 'true'
        run: |
          # Create a temporary directory to hold build artifacts
          mkdir ../ppa-temp
          cp -r dist/* ../ppa-temp/
          cp .gitignore ../ppa-temp/ || true

          # Switch to the target branch (cleanly)
          git checkout --orphan tmp-branch
          git rm -rf .

          # Move files back to the root
          cp -r ../ppa-temp/* .
          rm -rf ../ppa-temp

      - name: Deploy to Build Branch
        if: steps.calver.outputs.should_build == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          branch: ${{ steps.calver.outputs.dest_branch }}
          create_branch: true
          push_options: "--force"
          commit_message: "Build v${{ steps.calver.outputs.version }} from ${{ github.ref_name }} [${{ github.sha }}]"

      # Tag the source commit once the build is published. The tag is both the
      # immutable version<->commit record and the anchor the next build counts
      # from (see calculate-version.cjs). Done after Deploy so a failed publish
      # never leaves a tag that would suppress a retry.
      - name: Tag built version
        if: steps.calver.outputs.should_build == 'true'
        env:
          VERSION: ${{ steps.calver.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v${VERSION}" -m "Build v${VERSION} from ${GITHUB_REF_NAME}" "${GITHUB_SHA}"
          git push origin "refs/tags/v${VERSION}"

      # When this build represents the current "latest stable" cycle (the
      # highest release/YY.MM on origin, or whatever STABLE_RELEASE_BRANCH
      # overrides it to), also publish to ppa-build-stable so consumers
      # tracking the stable channel pick it up automatically.
      - name: Promote to ppa-build-stable
        if: steps.calver.outputs.should_build == 'true' && steps.calver.outputs.publish_stable == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          branch: ppa-build-stable
          create_branch: true
          push_options: "--force"
          commit_message: "Build v${{ steps.calver.outputs.version }} from ${{ github.ref_name }} [${{ github.sha }}] (promoted to stable)"

  build-deb:
    needs: process-release
    if: needs.process-release.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          sparse-checkout: debian

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y build-essential debhelper devscripts

      - name: Build .deb package
        env:
          DEBFULLNAME: Landscape Team
          DEBEMAIL: landscape-team@canonical.com
          VERSION: ${{ needs.process-release.outputs.version }}
        run: |
          # Move pre-built files to root level (matching ppa-build layout
          # that debian/rules expects: assets/, icons/, index.html, favicon.svg at root)
          cp -r dist/assets .
          cp -r dist/icons .
          cp dist/index.html dist/favicon.svg .
          rm -rf dist

          # Update debian/changelog with the build version
          dch --newversion "${VERSION}-0landscape0" \
              --distribution jammy \
              "Release ${VERSION} for jammy"

          # Create the orig tarball
          tar czf "../landscape-dashboard_${VERSION}.orig.tar.gz" \
            assets favicon.svg index.html icons

          # Build the binary .deb (unsigned)
          dpkg-buildpackage -us -uc -b

          # Copy .deb into workspace (upload-artifact doesn't allow ../ paths)
          cp ../landscape-dashboard_*.deb .

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: landscape-dashboard-deb
          path: landscape-dashboard_*.deb
          retention-days: 30
