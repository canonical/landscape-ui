name: Full TICS report

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 1 * *"

jobs:
  unit-tests:
    runs-on: [self-hosted, Linux, large]
    permissions:
      contents: read
      pull-requests: write
    environment: dev
    env:
      VITE_API_URL: ${{ vars.API_URL }}
      VITE_API_URL_OLD: ${{ vars.API_URL_OLD }}
      VITE_API_URL_DEB_ARCHIVE: ${{ vars.API_URL_DEB_ARCHIVE }}
      VITE_API_PROXY_TARGET: ${{ vars.API_PROXY_TARGET }}
      VITE_APP_TITLE: Landscape
      VITE_ROOT_PATH: /new_dashboard/
      VITE_REPORT_VIEW_ENABLED: false
      VITE_DETAILED_UPGRADES_VIEW_ENABLED: false
      VITE_APP_VERSION: "26.04.0.12"
      VITE_APP_COMMIT: ${{ github.sha }}
      VITE_SELF_HOSTED_ENV: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm exec vitest run --coverage
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vitest-report
          path: ${{ github.workspace }}/reports
          retention-days: 30

  tics-report:
    runs-on: [self-hosted, linux, amd64, tiobe, jammy]
    needs: unit-tests
    # Self-hosted runners share machine-level resources. Serialize TICS
    # to avoid qserver collisions for the same project database.
    concurrency:
      group: tics-report-${{ github.repository }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download coverage report artifact
        uses: actions/download-artifact@v4
        with:
          name: vitest-report
          path: ${{ github.workspace }}/reports

      - name: Generate CSS module type declarations
        run: pnpm run tcm:run

      - name: TICS report
        uses: tiobe/tics-github-action@v3
        with:
          mode: qserver
          project: landscape-ui
          viewerUrl: https://canonical.tiobe.com/tiobeweb/TICS/api/cfg?name=default
          ticsAuthToken: ${{ secrets.TICSAUTHTOKEN }}
          installTics: true
          # Keep qserver temp state isolated per run to prevent stale lock/state
          # reuse between workflow runs on the same self-hosted machine.
          tmpdir: /tmp/tics-${{ github.run_id }}-${{ github.run_attempt }}
          additionalFlags: -archivefile '${{ github.workspace }}/.github/workflows/tiobe_archive.txt'
